# Shared resources for harness integration tests in Kind.
# Creates: LLMProvider (used by playbook-resources.yaml)
#
# Usage:
#   hack/harness-test/setup.sh

---
apiVersion: konveyor.io/v1alpha1
kind: LLMProvider
metadata:
  name: gcp-vertex-ai
spec:
  endpoint: "global-aiplatform.googleapis.com"
  credentialRef:
    secretName: vertex-credentials
  models:
    - name: claude-sonnet-4-5
      contextWindow: 200000
      tier: premium
