---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openai-emulator
  labels:
    app: openai-emulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openai-emulator
  template:
    metadata:
      labels:
        app: openai-emulator
    spec:
      containers:
      - name: openai-emulator
        image: openai-emulator:e2e
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
          name: http
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 2
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 2
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: openai-emulator
  labels:
    app: openai-emulator
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: openai-emulator
