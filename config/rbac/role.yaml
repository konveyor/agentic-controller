---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - get
  - list
  - watch
- apiGroups:
  - agents.x-k8s.io
  resources:
  - sandboxes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - konveyor.io
  resources:
  - agentruns
  - agents
  - llmproviders
  - skillcards
  - skillcollections
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - konveyor.io
  resources:
  - agentruns/finalizers
  - agents/finalizers
  - llmproviders/finalizers
  - skillcards/finalizers
  - skillcollections/finalizers
  verbs:
  - update
- apiGroups:
  - konveyor.io
  resources:
  - agentruns/status
  - agents/status
  - llmproviders/status
  - skillcards/status
  - skillcollections/status
  verbs:
  - get
  - patch
  - update
