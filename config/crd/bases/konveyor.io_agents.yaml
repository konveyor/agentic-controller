---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: agents.konveyor.io
spec:
  group: konveyor.io
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    shortNames:
    - ag
    singular: agent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.image
      name: Image
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Agent is a capability definition declaring what is available for execution.
          It references SkillCards, SkillCollections, LLMProviders, a container image,
          a prompt, and typed parameters. An Agent does not select a specific model —
          model selection happens at execution time via AgentRun.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentSpec defines the desired state of an Agent.
            properties:
              image:
                description: Image is the container image carrying the agent runtime
                  and toolchains.
                minLength: 1
                type: string
              params:
                description: Params declares the typed parameters this Agent accepts.
                items:
                  description: |-
                    AgentParam declares a typed parameter that an Agent accepts.
                    AgentRun supplies values for these parameters, which are injected as
                    KONVEYOR_PARAM_{NAME} env vars into the Sandbox.
                  properties:
                    default:
                      description: Default is the default value if not specified in
                        AgentRun.
                      type: string
                    description:
                      description: Description explains the purpose of the parameter.
                      type: string
                    name:
                      description: |-
                        Name is the parameter name. Will be uppercased and prefixed with
                        KONVEYOR_PARAM_ when injected as an env var.
                      minLength: 1
                      pattern: ^[a-zA-Z_][a-zA-Z0-9_]*$
                      type: string
                    required:
                      description: |-
                        Required indicates whether the parameter must be supplied.
                        A parameter with a default is never required.
                      type: boolean
                    type:
                      default: string
                      description: Type is the parameter type.
                      enum:
                      - string
                      - number
                      - boolean
                      type: string
                  required:
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: a parameter with a default value cannot be required
                    rule: '!(has(self.required) && self.required && has(self.default)
                      && size(self.default) > 0)'
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              prompt:
                description: |-
                  Prompt is the standing instructions for how the agent operates.
                  Composed with AgentRun instructions at execution time.
                type: string
              providers:
                description: |-
                  Providers is the set of LLM providers and models available for runs.
                  At least one provider must be specified.
                items:
                  description: AgentProviderRef references an LLMProvider by name.
                  properties:
                    ref:
                      description: Ref is the name of an LLMProvider CR in the same
                        namespace.
                      minLength: 1
                      type: string
                  required:
                  - ref
                  type: object
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - ref
                x-kubernetes-list-type: map
              skillCards:
                description: SkillCards references individual SkillCard CRs.
                items:
                  description: AgentSkillCardRef references a SkillCard by name.
                  properties:
                    ref:
                      description: Ref is the name of a SkillCard CR in the same namespace.
                      minLength: 1
                      type: string
                  required:
                  - ref
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - ref
                x-kubernetes-list-type: map
              skillCollections:
                description: SkillCollections references SkillCollection CRs.
                items:
                  description: AgentSkillCollectionRef references a SkillCollection
                    by name.
                  properties:
                    ref:
                      description: Ref is the name of a SkillCollection CR in the
                        same namespace.
                      minLength: 1
                      type: string
                  required:
                  - ref
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - ref
                x-kubernetes-list-type: map
            required:
            - image
            - providers
            type: object
          status:
            description: AgentStatus defines the observed state of an Agent.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the
                  Agent's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
