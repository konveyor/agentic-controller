---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: skillcards.konveyor.io
spec:
  group: konveyor.io
  names:
    kind: SkillCard
    listKind: SkillCardList
    plural: skillcards
    shortNames:
    - sc
    singular: skillcard
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SkillCard is an individual agent capability or behavioral constraint.
          It follows the skillimage.io/v1alpha1 SkillCard format and supports three
          source types: OCI image ref, git source URL, or inline markdown. All three
          converge to a resolved OCI image ref in status.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SkillCardSpec defines the desired state of a SkillCard.
              Exactly one of Image, Source, or Inline must be set.
            properties:
              description:
                description: Description is a short description of what the skill
                  does.
                type: string
              displayName:
                description: DisplayName is a human-readable name for the skill.
                type: string
              image:
                description: Image is an OCI image reference for a pre-built skill
                  artifact.
                type: string
              inline:
                description: |-
                  Inline is raw markdown content for the skill.
                  The controller builds and pushes an OCI artifact from this content.
                type: string
              source:
                description: |-
                  Source is a git URL pointing to a skill directory.
                  The controller clones, builds, and pushes the OCI artifact.
                type: string
              tags:
                description: Tags are labels for categorization and discovery.
                items:
                  type: string
                type: array
                x-kubernetes-list-type: set
              type:
                default: skill
                description: |-
                  Type indicates whether this is an on-demand skill or an always-loaded rule.
                  Defaults to "skill".
                enum:
                - skill
                - rule
                type: string
              version:
                description: Version is the semantic version of the skill.
                type: string
            type: object
            x-kubernetes-validations:
            - message: exactly one of image, source, or inline must be set
              rule: '(has(self.image) ? 1 : 0) + (has(self.source) ? 1 : 0) + (has(self.inline)
                ? 1 : 0) == 1'
          status:
            description: SkillCardStatus defines the observed state of a SkillCard.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the SkillCard's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              resolvedImage:
                description: |-
                  ResolvedImage is the OCI image reference for the resolved skill artifact.
                  Set after successful resolution from any source type.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
