# Serves the static SPA and proxies /api (HTTP + WebSocket) to the
# agentic-gateway Service, so the browser only ever talks same-origin.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;

    # REST + WebSocket to the gateway (ACP sessions are long-lived).
    location /api/ {
        proxy_pass http://agentic-gateway:7080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /healthz {
        proxy_pass http://agentic-gateway:7080/healthz;
    }

    # Static SPA (no client-side routes today; try_files future-proofs).
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
