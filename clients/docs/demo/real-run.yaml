apiVersion: konveyor.io/v1alpha1
kind: AgentRun
metadata:
  generateName: real-
  namespace: konveyor-agents
spec:
  agentRef: migration-analyzer-goose
  params:
  - name: repository
    value: https://github.com/konveyor-ecosystem/coolstore
  - name: branch
    value: main
  models:
  - role: primary
    provider: bedrock
    model: "global.anthropic.claude-haiku-4-5-20251001-v1:0"
  env:
  - name: GOOSE_MODE
    value: auto
  envFrom:
  - secretRef:
      name: aws-bedrock-creds
