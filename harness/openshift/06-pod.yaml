apiVersion: v1
kind: Pod
metadata:
  name: migration-harness
  namespace: migration-harness
  labels:
    app: migration-harness
spec:
  # Keep pod running for interactive use
  restartPolicy: Never

  containers:
    - name: migration-harness
      image: image-registry.openshift-image-registry.svc:5000/migration-harness/migration-harness:latest
      command:
        - /bin/bash
        - -c
        - |
          # Create directories and copy ConfigMap files to writable locations
          mkdir -p /root/.config/goose/custom_providers
          mkdir -p /root/.migration-harness
          cp /config-readonly/goose-config.yaml /root/.config/goose/config.yaml
          cp /config-readonly/custom_testinglite.json /root/.config/goose/custom_providers/custom_testinglite.json
          cp /config-readonly/mh-config /root/.migration-harness/config
          echo 'Migration harness ready. Use oc rsh to connect.'
          sleep infinity

      resources:
        requests:
          cpu: "2"
          memory: "4Gi"
        limits:
          cpu: "4"
          memory: "8Gi"

      env:
        # API key for custom_testinglite provider (replaces macOS Keychain)
        - name: CUSTOM_TESTINGLITE_API_KEY
          valueFrom:
            secretKeyRef:
              name: mh-credentials
              key: CUSTOM_TESTINGLITE_API_KEY

      volumeMounts:
        # Workspace PVC — clone repos here, survives pod restarts
        - name: workspace
          mountPath: /workspace

        # Outputs PVC — migration results persist here
        - name: outputs
          mountPath: /root/.migration-harness/runs

        # Read-only ConfigMap mount (copied to writable locations at startup)
        - name: config-readonly
          mountPath: /config-readonly
          readOnly: true

  volumes:
    - name: workspace
      persistentVolumeClaim:
        claimName: mh-workspace

    - name: outputs
      persistentVolumeClaim:
        claimName: mh-outputs

    - name: config-readonly
      configMap:
        name: mh-config
