version: "1.0.0"
title: "Verify migration"
description: "Compile and test the migrated repo. Reports errors but does NOT fix them."

settings:
  temperature: 1

parameters:
  - key: repo
    input_type: string
    requirement: required
    description: "Absolute path to the (now-migrated) repository"
  - key: plan_md_path
    input_type: string
    requirement: required
    description: "Path to PLAN.md with verification section"
  - key: execution_log_path
    input_type: string
    requirement: required
    description: "Path to execution-log.md with execution details"
  - key: migration_type
    input_type: string
    requirement: required
    description: "Migration key, e.g. java-ee-to-quarkus, python2-to-python3"

extensions:
  - type: builtin
    name: developer
    timeout: 1800
    bundled: true

instructions: |
  You are verifying a migrated codebase and can attempt fixes if needed.

  PHASE 1 — READ VERIFICATION STEPS:
  1. Read {{ plan_md_path }} and locate the "## Verification" section
  2. This section contains the verification commands to run (e.g., mvn compile, npm test)
  3. Note: Read ONLY the Verification section, ignore Goal, Summary, and Steps sections

  PHASE 2 — RUN VERIFICATION:
  4. Execute the verification commands from PLAN.md
  5. Capture:
     - Build status (success/failure)
     - Test results (passed/failed counts)
     - Compilation errors (file, line, message)

  PHASE 3 — AUTO-FIX (if needed, max 3 iterations):
  6. If compilation/build FAILS:
     - Read {{ execution_log_path }} to understand what execution attempted
     - Identify root cause of failures
     - Make targeted fixes to resolve compilation errors
     - Re-run verification
     - Repeat up to 3 times total

  7. If still failing after 3 attempts:
     - Document remaining errors
     - Return current state

  RULES:
  - Focus on compilation errors first (tests can fail, that's okay)
  - Only fix what's broken, don't refactor working code
  - Read execution-log.md only if you have compilation failures
  - Track your fix attempts in the response
  - Maximum 3 fix attempts, then stop

  WHAT TO RETURN:
  - build_ok: true if compiles, false if not
  - tests_passed/tests_total: test counts
  - errors: array of remaining compilation errors
  - fix_attempts: number of fix iterations you tried (0-3)
  - fixes_applied: description of what you fixed
  - summary: overall status

prompt: |
  Verify the migrated codebase at {{ repo }}.

  Migration type: {{ migration_type }}
  Plan with verification steps: {{ plan_md_path }}
  Execution log (for context if needed): {{ execution_log_path }}

  Read the Verification section from PLAN.md, run those commands, and attempt
  fixes if compilation fails (up to 3 iterations). Return the final state.

response:
  json_schema:
    type: object
    required: [build_ok, summary, fix_attempts, fixes_applied]
    properties:
      build_ok:      { type: boolean, description: "True if compilation succeeds" }
      tests_total:   { type: integer, description: "Total number of tests" }
      tests_passed:  { type: integer, description: "Number of tests that passed" }
      tests_failed:  { type: integer, description: "Number of tests that failed" }
      fix_attempts:  { type: integer, description: "Number of fix iterations attempted (0-3)" }
      fixes_applied: { type: string, description: "Description of fixes made (empty if none)" }
      errors:
        type: array
        description: "Remaining compilation errors after fix attempts"
        items:
          type: object
          properties:
            file:    { type: string }
            line:    { type: integer }
            message: { type: string }
      summary: { type: string, description: "Overall verification status" }
